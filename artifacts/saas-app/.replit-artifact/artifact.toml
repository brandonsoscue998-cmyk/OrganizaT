kind = "web"
previewPath = "/"
title = "SaaS App"
version = "1.0.0"
id = "artifacts/saas-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22348

[services.development]
run = "pnpm --filter @workspace/saas-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saas-app", "run", "build" ]
publicDir = "artifacts/saas-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22348"
BASE_PATH = "/"
